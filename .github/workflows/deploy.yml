name: Deploy ke InfinityFree via FTP

on:
  push:
    branches:
      - main # Skrip berjalan otomatis setiap kamu push ke branch main

jobs:
  web-deploy:
    name: 🚀 Deploying Perubahan Terbaru
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Ambil source code terbaru dari GitHub
      - name: 📦 Mengambil Source Code Terbaru
        uses: actions/checkout@v4

      # Langkah 2: Setup PHP (sesuai kebutuhan CodeIgniter 3)
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, mbstring, gd, zip

      # Langkah 3: Install dependensi Composer (vendor/ diabaikan di .gitignore)
      # Step ini penting karena folder vendor/ tidak ikut di-push ke GitHub
      # COMPOSER_MEMORY_LIMIT=-1 mencegah PHP crash karena memory limit
      # --no-scripts mencegah error dari post-install-cmd yang merujuk package dev
      - name: 📥 Install Composer Dependencies
        env:
          COMPOSER_MEMORY_LIMIT: -1
        run: composer install --no-dev --no-scripts --no-interaction --ignore-platform-reqs

      # Langkah 4: Sinkronisasi semua file ke server FTP InfinityFree
      - name: 📂 Sinkronisasi File ke Server FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # InfinityFree: root FTP sudah mengarah ke /htdocs secara otomatis
          # Jika project kamu ada di subfolder, ubah menjadi: ./htdocs/nama-folder/
          server-dir: ./htdocs/
          local-dir: ./
          # Daftar file/folder yang TIDAK perlu dikirim ke server
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .editorconfig
            readme.rst
            license.txt
            db_cuti.sql
          # Jangan gunakan true (akan menghapus semua file di server dulu!)
          dangerous-clean-slate: false
