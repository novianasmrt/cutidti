name: Deploy ke InfinityFree via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploying ke InfinityFree
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Ambil source code terbaru dari GitHub
      - name: 📦 Checkout Source Code
        uses: actions/checkout@v4

      # Langkah 2: Inject kredensial database dari GitHub Secrets ke database.php
      # hostname menggunakan 'localhost' karena PHP dan MySQL ada di server yang sama (InfinityFree)
      # username, password, database diambil dari GitHub Secrets agar tidak masuk ke kode
      - name: 🔧 Inject Konfigurasi Database Production
        run: |
          sed -i "s/'username' => 'root'/'username' => '${{ secrets.DB_USERNAME }}'/" application/config/database.php
          sed -i "s/'password' => ''/'password' => '${{ secrets.DB_PASSWORD }}'/" application/config/database.php
          sed -i "s/'database' => 'db_cuti'/'database' => '${{ secrets.DB_NAME }}'/" application/config/database.php
          echo "✅ Konfigurasi database berhasil diinjeksi"

      # Langkah 3: Upload semua file ke server FTP InfinityFree
      - name: 📂 Upload ke Server InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./htdocs/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            .editorconfig
            readme.rst
            license.txt
            db_cuti.sql
            composer.lock
          dangerous-clean-slate: false
