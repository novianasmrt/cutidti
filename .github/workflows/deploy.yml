name: Deploy ke InfinityFree via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploying ke InfinityFree
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Ambil source code terbaru dari GitHub
      - name: 📦 Checkout Source Code
        uses: actions/checkout@v4

      # Langkah 2: Inject kredensial database dari GitHub Secrets ke database.php
      # Cara ini memastikan password TIDAK pernah ada di dalam kode/GitHub
      - name: 🔧 Inject Konfigurasi Database Production
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cat > application/config/database.php << 'PHPEOF'
          <?php
          defined('BASEPATH') or exit('No direct script access allowed');

          $active_group = 'default';
          $query_builder = TRUE;

          $db['default'] = array(
              'dsn'          => '',
              'hostname'     => '${DB_HOST}',
              'username'     => '${DB_USERNAME}',
              'password'     => '${DB_PASSWORD}',
              'database'     => '${DB_NAME}',
              'dbdriver'     => 'mysqli',
              'port'         => '',
              'dbprefix'     => '',
              'pconnect'     => FALSE,
              'db_debug'     => FALSE,
              'cache_on'     => FALSE,
              'cachedir'     => '',
              'char_set'     => 'utf8',
              'dbcollat'     => 'utf8_general_ci',
              'swap_pre'     => '',
              'encrypt'      => FALSE,
              'compress'     => FALSE,
              'stricton'     => FALSE,
              'failover'     => array(),
              'save_queries' => TRUE
          );
          PHPEOF
          # Ganti placeholder dengan nilai dari Secrets
          sed -i "s|\${DB_HOST}|$DB_HOST|g" application/config/database.php
          sed -i "s|\${DB_USERNAME}|$DB_USERNAME|g" application/config/database.php
          sed -i "s|\${DB_PASSWORD}|$DB_PASSWORD|g" application/config/database.php
          sed -i "s|\${DB_NAME}|$DB_NAME|g" application/config/database.php

      # Langkah 3: Upload semua file ke server FTP InfinityFree
      - name: 📂 Upload ke Server InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./htdocs/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            .editorconfig
            readme.rst
            license.txt
            db_cuti.sql
            composer.lock
          dangerous-clean-slate: false
